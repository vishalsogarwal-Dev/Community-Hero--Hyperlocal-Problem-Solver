version: '3.8'

services:
  # Database: PostgreSQL 16 + PostGIS
  postgres:
    image: postgis/postgis:16-3.4
    container_name: community_hero_postgres
    environment:
      POSTGRES_DB: community_hero
      POSTGRES_USER: hero_user
      POSTGRES_PASSWORD: hero_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks:
      - community_hero_network

  # Caching and Leaderboard Store: Redis
  redis:
    image: redis:7-alpine
    container_name: community_hero_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - community_hero_network

  # Message Broker: RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: community_hero_rabbitmq
    ports:
      - "5672:5672"       # AMQP protocol
      - "15672:15672"     # Management Console UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    networks:
      - community_hero_network

  # Object Storage (S3 Emulation): MinIO
  minio:
    image: minio/minio:latest
    container_name: community_hero_minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"       # API port
      - "9001:9001"       # Console port
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password
    volumes:
      - minio_data:/data
    restart: unless-stopped
    networks:
      - community_hero_network

  # Spatial Microservice: FastAPI + PostGIS
  spatial-service:
    build:
      context: ./spatial-service
    container_name: community_hero_spatial
    ports:
      - "8001:8001"
    env_file:
      - ./spatial-service/.env
    environment:
      DB_HOST: postgres
    depends_on:
      - postgres
      - minio
    restart: unless-stopped
    networks:
      - community_hero_network

  # Core NestJS Backend
  backend-core:
    build:
      context: ./backend-core
    container_name: community_hero_backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend-core/.env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      MINIO_ENDPOINT: minio
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - minio
    restart: unless-stopped
    networks:
      - community_hero_network

  # AI Async Workers: Celery + YOLOv8 + MobileNetV3
  async-workers:
    build:
      context: ./async-workers
    container_name: community_hero_workers
    env_file:
      - ./async-workers/.env
    environment:
      DB_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      MINIO_ENDPOINT: minio
      CORE_WS_NOTIFY_URL: http://backend-core:3000/internal/notify
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - minio
    restart: unless-stopped
    networks:
      - community_hero_network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:

networks:
  community_hero_network:
    driver: bridge
